tfs:
  url: "${TFS_URL}"
  api_version: "7.2-preview"
  timeout_seconds: 30
  verify_ssl: false
  projects: []

sync:
  interval_hours: 6
  default_period_days: 180

server:
  host: "0.0.0.0"
  port: "${PORT}"

database:
  path: "data/pulse.db"

# Несколько инстансов локального TFS. Каждый — отдельная SQLite-база.
# В UI появляется переключатель; настройки/PAT хранятся внутри каждой БД отдельно.
# Если список пуст или отсутствует — используется одиночный режим (database.path).
instances:
  - id: main
    name: "Основной TFS"
    db_path: "data/pulse.db"
  - id: ir
    name: "TFS IR"
    db_path: "data/pulseIR.db"

logging:
  level: "${LOG_LEVEL}"
  file: "logs/app.log"
