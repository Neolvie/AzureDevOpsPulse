<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AzureDevOps Pulse{% endblock %}</title>
  <script>(function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');})()</script>
  <!-- Multi-instance: подставляем выбранный инстанс TFS в каждый запрос к /api/ -->
  <script>
  (function(){
    var KEY='pulse_instance';
    window.pulseInstance = function(){ return localStorage.getItem(KEY) || ''; };
    var _fetch = window.fetch;
    window.fetch = function(input, init){
      try {
        var id = window.pulseInstance();
        if (id) {
          var urlStr = (typeof input === 'string') ? input
                     : (input instanceof URL) ? input.toString()
                     : (input && input.url) ? input.url : null;
          if (urlStr) {
            var u = new URL(urlStr, location.origin);
            if (u.origin === location.origin &&
                u.pathname.indexOf('/api/') !== -1 &&
                !u.searchParams.has('instance')) {
              u.searchParams.set('instance', id);
              if (typeof input === 'string' || input instanceof URL) input = u.toString();
              else input = new Request(u.toString(), input);
            }
          }
        }
      } catch (e) { /* no-op: при любой ошибке шлём запрос как есть */ }
      return _fetch.call(this, input, init);
    };
  })();
  </script>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pikaday@1.8.2/css/pikaday.css">
  <style>
    /* Heatmap legend cells — use CSS vars so they follow the active theme */
    .heatmap-legend-cell:nth-child(2) { background: var(--pulse-0); border: 1px solid var(--border); }
    .heatmap-legend-cell:nth-child(3) { background: var(--pulse-1); }
    .heatmap-legend-cell:nth-child(4) { background: var(--pulse-2); }
    .heatmap-legend-cell:nth-child(5) { background: var(--pulse-3); }
    .heatmap-legend-cell:nth-child(6) { background: var(--pulse-4); }
  </style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1f6feb" stroke-width="2.5">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    <span>DevOps Pulse</span>
  </div>
  <div class="sidebar-instance" id="instance-box" style="display:none">
    <label for="instance-select">Инстанс TFS</label>
    <select id="instance-select"></select>
  </div>
  <div class="sidebar-nav">
    <div class="nav-item" data-href="/">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      <span>Обзор</span>
    </div>
    <div class="nav-item" data-href="/repos">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h6l2 3h10a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/></svg>
      <span>Репозитории</span>
    </div>
    <div class="nav-item" data-href="/settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>Настройки</span>
    </div>
  </div>
  <div class="sidebar-footer">
    <button class="theme-toggle" id="theme-toggle" title="Светлая/тёмная тема">
      <!-- Sun icon — visible in dark mode -->
      <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <!-- Moon icon — visible in light mode -->
      <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
    <span class="sidebar-version">v1.0</span>
  </div>
</nav>

<main class="main">
  {% block content %}{% endblock %}
</main>

<div class="tooltip" id="heatmap-tooltip"></div>

<script src="https://cdn.jsdelivr.net/npm/pikaday@1.8.2/pikaday.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="/static/js/pulse.js"></script>
<script src="/static/js/app.js"></script>
<!-- Multi-instance: наполняем переключатель и переключаем активный инстанс -->
<script>
(function(){
  var KEY='pulse_instance';
  var box = document.getElementById('instance-box');
  var sel = document.getElementById('instance-select');
  if (!sel) return;
  fetch('/api/instances').then(function(r){return r.json();}).then(function(j){
    if (!j.success) return;
    var list = (j.data && j.data.instances) || [];
    if (list.length <= 1) return;  // одиночный режим — переключатель не нужен
    var cur = localStorage.getItem(KEY) || j.data.current || list[0].id;
    sel.innerHTML = list.map(function(i){
      return '<option value="'+i.id+'">'+i.name+'</option>';
    }).join('');
    sel.value = cur;
    if (!localStorage.getItem(KEY)) localStorage.setItem(KEY, cur);
    box.style.display = '';
    sel.addEventListener('change', function(){
      localStorage.setItem(KEY, sel.value);
      location.reload();
    });
  }).catch(function(){});
})();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
